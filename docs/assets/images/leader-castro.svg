<svg xmlns="http://www.w3.org/2000/svg" width="365" height="365" viewBox="0 0 365 365">
  <!-- Placeholder headshot for Dr. Isidro Castro Mendoza -->
  <!-- Background -->
  <rect width="365" height="365" fill="#FAF8F4"/>
  <!-- Circular avatar background -->
  <circle cx="182.5" cy="182.5" r="182.5" fill="#1B2A4A"/>
  <!-- Subtle inner circle ring -->
  <circle cx="182.5" cy="182.5" r="160" fill="none" stroke="#C5A55A" stroke-width="1.5" opacity="0.3"/>
  <!-- Initials: ICM -->
